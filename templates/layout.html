<!DOCTYPE html>
<html>
<head>

<title>Doctor Finder</title>

<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') 
}}">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="{{ url_for('static', filename='script.js') }}?v=2"></script>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-base">

<div class="container">

<a class="navbar-brand" href="/">Doctor Finder</a>

<form class="d-flex" action="/search">
<input class="form-control me-2" name="q" placeholder="Search doctors">

</form>

<a class="btn btn-accent ms-3" href="/add">Add Doctor</a>

</div>

</nav>

<div class="container mt-4">

{% block content %}

{% endblock %}

</div>

</body>
</html>
